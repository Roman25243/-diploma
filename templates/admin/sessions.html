{% extends "base.html" %}
{% block content %}
<h1 class="text-center">Керування сеансами</h1>

<h3>Додати сеанс</h3>
<form method="POST" class="mb-5">
    <div class="row">
        <div class="col-md-4">
            <div class="mb-3">
                <label>Фільм</label>
                <select name="film_id" class="form-control" required>
                    {% for film in films %}
                    <option value="{{ film.id }}">{{ film.title }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="col-md-4">
            <div class="mb-3">
                <label>Час сеансу</label>
                <input type="datetime-local" name="start_time" class="form-control" required>
            </div>
        </div>
        <div class="col-md-4">
            <div class="mb-3">
                <label>Ціна (грн)</label>
                <input type="number" step="0.01" name="price" class="form-control" required>
            </div>
        </div>
    </div>
    <div class="text-center">
        <button type="submit" class="btn btn-success btn-lg">Додати сеанс</button>
    </div>
</form>

<h3>Існуючі сеанси</h3>
<ul class="list-group">
    {% for session in sessions %}
    <li class="list-group-item">
        <strong>{{ session.film.title }}</strong> — {{ session.start_time }} — {{ session.price }} грн
    </li>
    {% endfor %}
</ul>
{% endblock %}
